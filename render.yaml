# Render blueprint for deploying the FastAPI backend.
#
# Usage:
# 1) Push this repo to GitHub.
# 2) In Render, "New +", choose Blueprint, connect the repo.
# 3) Render will create the service below. Deploy.

services:
  - type: web
    name: book-vocabulary-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 10000
