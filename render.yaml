# Render blueprint for deploying the FastAPI backend.
#
# Usage:
# 1) Push this repo to GitHub.
# 2) In Render, "New +", choose Blueprint, connect the repo.
# 3) Render will create the service below. Deploy.

services:
  - type: web
    name: book-vocabulary-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.12.3"
